        body { font-family: 'Work Sans', sans-serif; }

<body class="bg-surface text-on-background selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- iOS Frame Emulation -->
<div class="max-w-[390px] min-h-screen mx-auto relative bg-surface shadow-2xl overflow-hidden flex flex-col">
<!-- TOP APP BAR -->
<header class="sticky top-0 z-40 bg-surface pt-8 pb-4">
<div class="flex justify-between items-center w-full px-5 max-w-7xl mx-auto">
<!-- Search Button -->
<button class="w-10 h-10 flex items-center justify-center rounded-full border border-outline-variant hover:bg-surface-container-low transition-colors active:scale-95 duration-150">
<span class="material-symbols-outlined text-primary" data-icon="search">search</span>
</button>
<!-- Location Center -->
<div class="flex flex-col items-center">
<span class="text-label-md text-on-surface-variant">Location</span>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[16px] text-error" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>

<span class="material-symbols-outlined text-[18px] text-on-surface-variant" data-icon="keyboard_arrow_down">keyboard_arrow_down</span>
</div>
</div>
<!-- Cart Button -->

<span class="material-symbols-outlined text-primary" data-icon="shopping_cart">shopping_cart</span>
<div class="absolute -top-1 -right-1 w-4 h-4 bg-primary-container text-white text-[8px] flex items-center justify-center rounded-full font-bold border-2 border-surface">2</div>
</button>
</div>
</header>
<!-- MAIN CONTENT SCROLL AREA -->
<main class="flex-1 overflow-y-auto hide-scrollbar pb-32">
<!-- FILTER CHIPS -->
<section class="flex gap-3 px-margin-page mt-stack-sm overflow-x-auto hide-scrollbar">
<button class="flex items-center gap-2 px-4 py-2 rounded-full border border-outline-variant bg-surface-container-lowest shrink-0 hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="moped">moped</span>
<span class="text-label-md">Pickup</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 rounded-full border border-outline-variant bg-surface-container-lowest shrink-0 hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="schedule">schedule</span>
<span class="text-label-md">Under 30 min</span>
</button>
<button class="flex items-center gap-2 px-4 py-2 rounded-full border border-outline-variant bg-surface-container-lowest shrink-0 hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-[18px] text-primary" data-icon="sell">sell</span>
<span class="text-label-md">Price</span>
</button>
</section>
<!-- PROMO BANNER -->

<div class="w-1.5 h-1.5 rounded-full bg-outline-variant"></div>
<div class="w-1.5 h-1.5 rounded-full bg-outline-variant"></div>

</div>

<div class="flex items-center gap-0.5">
<span class="material-symbols-outlined text-secondary-container text-[16px]" data-icon="star" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="text-label-md font-bold">4.7</span>
</div>
</div>
<p class="text-label-md text-on-surface-variant">21 min · 500km</p>

<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-50 flex justify-between items-center px-3 py-2 bg-primary-container rounded-full shadow-2xl">

<button class="flex items-center gap-2 bg-on-background text-surface rounded-full px-5 py-2.5 transition-all duration-300">
<span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>

</button>
<!-- Inactive items -->

</button>
<button class="flex items-center justify-center text-white/80 p-3 hover:text-white transition-colors active:scale-90">

</button>
<button class="flex items-center justify-center text-white/80 p-3 hover:text-white transition-colors active:scale-90">

</button>
<button class="flex items-center justify-center text-white/80 p-3 hover:text-white transition-colors active:scale-90">

</button>

<!-- iOS Safe Area Spacer -->
<div class="h-8 bg-surface shrink-0"></div>
</div>
<script>
    // Micro-interactions
    document.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('touchstart', () => btn.classList.add('scale-95'));
        btn.addEventListener('touchend', () => btn.classList.remove('scale-95'));
    });
</script>
